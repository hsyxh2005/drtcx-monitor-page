<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRTCX Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            padding: 20px;
            background-color: #f5f7fa;
        }
        .header-box {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: #222;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .title-text h1 {
            font-size: 28px;
            color: #1a1a1a;
        }
        .jump-btn {
            margin-left: auto;
            padding: 10px 18px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }
        .jump-btn:hover {
            background: #1d4ed8;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .status-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .total-status {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .normal {color: #16a34a;}
        .part-error {color: #f59e0b;}
        .all-stop {color: #dc2626;}
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f9fafb;
            border-radius: 8px;
        }
        .footer {
            margin-top: 60px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <div class="logo">
  <img src="./logo.png" alt="DRTCX Logo" style="width:100%;height:100%;object-fit:contain;">
</div>
            <div class="title-text">
                <h1>drtcx status</h1>
            </div>
            <a href="https://state.drtcx.com" class="jump-btn">跳转至详细监控页</a>
        </div>

        <div class="status-card">
            <div class="total-status" id="totalTip">正在检测服务状态...</div>
            <div class="item-list" id="serviceList"></div>
        </div>

        <div class="footer">
            ©东睿创想（DRTCX）All Rights Reserved.
        </div>
    </div>

    <script>
        // 需要监控的域名：第三~第七个
        const checkDomains = [
            {name: "drtcx.com", url: "http://drtcx.com"},
            {name: "chenxi-IM.drtcx.com", url: "http://chenxi-IM.drtcx.com"},
            {name: "chenxireader.drtcx.com", url: "http://chenxireader.drtcx.com"},
            {name: "chenximusic.drtcx.com", url: "http://chenximusic.drtcx.com"},
            {name: "chenxi-AGI.drtcx.com", url: "http://chenxi-AGI.drtcx.com"}
        ];

        let successCount = 0;
        const listDom = document.getElementById("serviceList");
        const tipDom = document.getElementById("totalTip");

        // 逐个检测接口
        async function checkSingle(item) {
            try {
                // 使用fetch跨域预检，判断连通性
                const res = await fetch(item.url, {mode: 'no-cors'});
                return true;
            }catch(e) {
                return false;
            }
        }

        async function runCheck() {
            listDom.innerHTML = "";
            successCount = 0;
            let resultArr = [];

            for(let item of checkDomains) {
                let isOk = await checkSingle(item);
                resultArr.push({...item, ok: isOk});
                if(isOk) successCount++;

                // 渲染单行
                let row = document.createElement("div");
                row.className = "item-row";
                row.innerHTML = `
                    <span>${item.name}</span>
                    <span style="color:${isOk?'#16a34a':'#dc2626'}">${isOk ? "正常运行" : "无法访问"}</span>
                `;
                listDom.appendChild(row);
            }

            // 汇总状态文案
            const total = checkDomains.length;
            if(successCount === total) {
                tipDom.className = "total-status normal";
                tipDom.innerText = "✅ 一切服务运行正常";
            }else if(successCount === 0) {
                tipDom.className = "total-status all-stop";
                tipDom.innerText = "❌ 服务器例行停机提醒，全部服务离线";
            }else {
                tipDom.className = "total-status part-error";
                tipDom.innerText = `⚠️ 部分服务异常（正常${successCount}项/总共${total}项）`;
            }
        }

        // 页面加载执行 + 3分钟自动刷新检测
        runCheck();
        setInterval(runCheck, 180000);
    </script>
</body>
</html>
