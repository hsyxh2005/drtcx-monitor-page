<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DRTCX 服务状态监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            min-height: 100vh;
            background: #f0f2f6;
            padding: 24px 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header-box {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 18px;
            margin-bottom: 32px;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: transparent;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .title-text h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2c3e66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .title-text p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 4px;
        }
        .jump-btn {
            margin-left: auto;
            padding: 10px 24px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .jump-btn:hover {
            background: #1e3a8a;
            transform: translateY(-1px);
        }
        .status-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-top: 8px;
        }
        .status-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1.6rem 1.8rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 0.75rem;
        }
        .card-header h2 {
            font-size: 1.55rem;
            font-weight: 600;
            color: #0f172a;
        }
        .badge-tag {
            font-size: 0.75rem;
            background: #eef2ff;
            color: #2563eb;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .total-status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            border-radius: 20px;
            display: inline-block;
            width: auto;
        }
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #fafcff;
            border-radius: 20px;
            border: 1px solid #edf2f7;
        }
        .service-name {
            font-weight: 500;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .service-name:before {
            content: "🌐";
            font-size: 1.1rem;
        }
        .status-badge {
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .status-normal {
            color: #0f6e3f;
            background: #e0f2e9;
        }
        .status-error {
            color: #b91c1c;
            background: #ffe8e8;
        }
        .footer {
            margin-top: 70px;
            text-align: center;
            color: #5b6e8c;
            font-size: 0.85rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 28px;
        }
        @media (max-width: 650px) {
            .status-card { padding: 1.2rem; }
            .item-row { flex-direction: column; align-items: flex-start; gap: 8px; }
            .jump-btn { margin-left: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-box">
        <div class="logo">
            <img src="./logo.png" alt="DRTCX Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22%3E%3Crect width=%2280%22 height=%2280%22 fill=%22%231e293b%22/%3E%3Ctext x=%2216%22 y=%2252%22 fill=%22white%22 font-size=%2230%22%3ED%3C/text%3E%3C/svg%3E'">
        </div>
        <div class="title-text">
            <h1>drtcx status</h1>
            <p>通过 Cloudflare Worker 实时探测 · 精准状态码</p>
        </div>
        <a href="https://state.drtcx.com/status/drtcx" class="jump-btn" target="_blank">📊 跳转至详细监控页 →</a>
    </div>

    <div class="status-grid">
        <div class="status-card">
            <div class="card-header">
                <h2>🌍 服务状态总览</h2>
                <span class="badge-tag">200-299 / 400-499 均视为正常</span>
            </div>
            <div class="total-status" id="totalStatus">⏳ 正在通过 Worker 检测...</div>
            <div class="item-list" id="serviceList"></div>
        </div>
    </div>

    <div class="footer" id="dynamicFooter"></div>
</div>

<script>
    // ==================== 配置区 ====================
    // 【重要】请替换成您自己的 Cloudflare Worker 地址
    const WORKER_URL = 'https://drtcx-proxy.592808050.workers.dev/api/status';
    
    // 服务列表（与 Worker 中保持一致，仅用于前端显示）
    const SERVICES = [
        "drtcx.com",
        "chenxi-IM.drtcx.com", 
        "chenxireader.drtcx.com",
        "chenximusic.drtcx.com",
        "chenxi-AGI.drtcx.com"
    ];
    // ================================================

    async function fetchStatus() {
        const totalDom = document.getElementById("totalStatus");
        const listDom = document.getElementById("serviceList");
        
        if (!listDom) return;
        
        // 显示加载状态
        totalDom.innerHTML = "⏳ 正在通过 Worker 检测服务状态...";
        listDom.innerHTML = '<div class="item-row"><span>🔄 连接 Worker 代理中...</span></div>';
        
        try {
            // 请求 Cloudflare Worker
            const response = await fetch(WORKER_URL, {
                method: "GET",
                headers: { "Content-Type": "application/json" }
            });
            
            if (!response.ok) {
                throw new Error(`Worker 返回错误: ${response.status}`);
            }
            
            const data = await response.json();
            const results = data.results;
            
            // 渲染列表
            listDom.innerHTML = "";
            let successCount = 0;
            
            for (let i = 0; i < results.length; i++) {
                const item = results[i];
                const isOk = item.ok;
                if (isOk) successCount++;
                
                const row = document.createElement("div");
                row.className = "item-row";
                const statusText = isOk ? '✅ 服务正常' : '❌ 无法访问';
                const statusClass = isOk ? 'status-normal' : 'status-error';
                const codeInfo = item.statusCode ? ` (${item.statusCode})` : '';
                // 使用 SERVICES 中的显示名称
                const displayName = SERVICES[i] || item.name;
                
                row.innerHTML = `
                    <div class="service-name">${escapeHtml(displayName)}</div>
                    <div class="status-badge ${statusClass}">${statusText}${codeInfo}</div>
                `;
                listDom.appendChild(row);
            }
            
            const total = results.length;
            
            // 更新总状态栏
            if (successCount === total && total > 0) {
                totalDom.className = "total-status normal";
                totalDom.innerHTML = `✅ 一切服务运行正常 (${successCount}/${total})`;
                totalDom.style.background = "#e6f7ec";
                totalDom.style.color = "#0b5e2e";
            } else if (successCount === 0) {
                totalDom.className = "total-status all-stop";
                totalDom.innerHTML = `⚠️ 服务器例行停机 · 服务暂时不可用 (0/${total})`;
                totalDom.style.background = "#fef2f2";
                totalDom.style.color = "#991b1b";
            } else {
                totalDom.className = "total-status part-error";
                totalDom.innerHTML = `⚠️ 部分服务异常 (正常 ${successCount}/${total})`;
                totalDom.style.background = "#fff1e0";
                totalDom.style.color = "#c2410c";
            }
            
        } catch (err) {
            console.error("请求 Worker 失败:", err);
            totalDom.className = "total-status all-stop";
            totalDom.innerHTML = `❌ 无法连接 Worker 代理，请检查 Worker 地址是否正确`;
            totalDom.style.background = "#fef2f2";
            totalDom.style.color = "#b91c1c";
            listDom.innerHTML = `<div class="item-row"><span>⚠️ 错误: ${escapeHtml(err.message)}</span></div>`;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function setCopyrightYear() {
        const footer = document.getElementById('dynamicFooter');
        if (footer) {
            const startYear = 2026;
            const currentYear = new Date().getFullYear();
            let yearDisplay = (currentYear > startYear) ? `${startYear}—${currentYear}` : `${startYear}`;
            footer.innerHTML = `© ${yearDisplay} 东睿创想（DRTCX）All Rights Reserved.`;
        }
    }
    
    // 页面启动
    setCopyrightYear();
    fetchStatus();
    // 每 2 分钟自动刷新
    setInterval(fetchStatus, 120000);
</script>
</body>
</html>
