<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRTCX 服务状态监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            min-height: 100vh;
            background: #f0f2f6;
            padding: 24px 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header-box {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 18px;
            margin-bottom: 32px;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: transparent;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .title-text h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2c3e66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .title-text p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 4px;
        }
        .jump-btn {
            margin-left: auto;
            padding: 10px 24px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .jump-btn:hover {
            background: #1e3a8a;
            transform: translateY(-1px);
        }
        .status-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-top: 8px;
        }
        .status-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1.6rem 1.8rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 0.75rem;
        }
        .card-header h2 {
            font-size: 1.55rem;
            font-weight: 600;
            color: #0f172a;
        }
        .badge-tag {
            font-size: 0.75rem;
            background: #eef2ff;
            color: #2563eb;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .total-status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            border-radius: 20px;
            display: inline-block;
            width: auto;
        }
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #fafcff;
            border-radius: 20px;
            border: 1px solid #edf2f7;
        }
        .service-name {
            font-weight: 500;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .service-name:before {
            content: "🌐";
            font-size: 1.1rem;
        }
        .api-card .service-name:before {
            content: "🔌";
        }
        .status-badge {
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .status-normal {
            color: #0f6e3f;
            background: #e0f2e9;
        }
        .status-error {
            color: #b91c1c;
            background: #ffe8e8;
        }
        .footer {
            margin-top: 70px;
            text-align: center;
            color: #5b6e8c;
            font-size: 0.85rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 28px;
        }
        @media (max-width: 650px) {
            .status-card { padding: 1.2rem; }
            .item-row { flex-direction: column; align-items: flex-start; gap: 8px; }
            .jump-btn { margin-left: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-box">
        <div class="logo">
            <img src="./logo.png" alt="DRTCX Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22%3E%3Crect width=%2280%22 height=%2280%22 fill=%22%231e293b%22/%3E%3Ctext x=%2216%22 y=%2252%22 fill=%22white%22 font-size=%2230%22%3ED%3C/text%3E%3C/svg%3E'">
        </div>
        <div class="title-text">
            <h1>drtcx status</h1>
            <p>基于图片探针 · 无CORS干扰 · 精准状态监测</p>
        </div>
        <a href="https://state.drtcx.com/status/drtcx" class="jump-btn" target="_blank">📊 跳转至详细监控页 →</a>
    </div>

    <div class="status-grid">
        <div class="status-card">
            <div class="card-header">
                <h2>🌍 网站状态</h2>
                <span class="badge-tag">WordPress · 核心站点</span>
            </div>
            <div class="total-status" id="webTotalStatus">⏳ 正在检测...</div>
            <div class="item-list" id="webServiceList"></div>
        </div>

        <div class="status-card api-card">
            <div class="card-header">
                <h2>⚙️ API & 端口服务</h2>
                <span class="badge-tag">AGI · Music · Ollama:11434</span>
            </div>
            <div class="total-status" id="apiTotalStatus">⏳ 正在检测...</div>
            <div class="item-list" id="apiServiceList"></div>
        </div>
    </div>

    <div class="footer" id="dynamicFooter"></div>
</div>

<script>
    // ==================== 监控配置 ====================
    // 网站组：使用图片探针检测（避免CORS）
    const WEBSITES = [
        { name: "drtcx.com", url: "https://drtcx.com/favicon.ico", fallbackUrl: "https://drtcx.com/robots.txt" },
        { name: "chenxi-IM.drtcx.com", url: "https://chenxi-IM.drtcx.com/favicon.ico", fallbackUrl: "https://chenxi-IM.drtcx.com/robots.txt" },
        { name: "chenxireader.drtcx.com", url: "https://chenxireader.drtcx.com/favicon.ico", fallbackUrl: "https://chenxireader.drtcx.com/robots.txt" }
    ];

    // API服务组（含Ollama端口）
    const API_SERVICES = [
        { name: "chenximusic.drtcx.com", url: "https://chenximusic.drtcx.com/favicon.ico", fallbackUrl: "https://chenximusic.drtcx.com/robots.txt" },
        { name: "chenxi-AGI.drtcx.com", url: "https://chenxi-AGI.drtcx.com/favicon.ico", fallbackUrl: "https://chenxi-AGI.drtcx.com/robots.txt" },
        { name: "Ollama API (11434端口)", url: "http://127.0.0.1:11434/", isPort: true, port: 11434 }
    ];

    // 通用的图片探针检测（适用于 HTTP/HTTPS 站点）
    function checkWithImageProbe(url, fallbackUrl, timeout = 8000) {
        return new Promise((resolve) => {
            const img = new Image();
            let resolved = false;
            const timer = setTimeout(() => {
                if (!resolved) {
                    resolved = true;
                    // 超时，尝试 fallback
                    if (fallbackUrl) {
                        checkWithImageProbe(fallbackUrl, null, timeout).then(resolve);
                    } else {
                        resolve({ ok: false, statusCode: null, error: "timeout" });
                    }
                }
            }, timeout);

            img.onload = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(timer);
                    // 图片加载成功 → 服务可访问（状态码 200-299）
                    resolve({ ok: true, statusCode: 200 });
                }
            };
            img.onerror = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(timer);
                    if (fallbackUrl) {
                        checkWithImageProbe(fallbackUrl, null, timeout).then(resolve);
                    } else {
                        // 加载失败 → 服务不可访问（可能是 404/403/500 或连接问题）
                        resolve({ ok: false, statusCode: null, error: "load_failed" });
                    }
                }
            };
            img.src = url + '?t=' + Date.now();
        });
    }

    // 端口检测（用于 Ollama 等非标准 Web 服务）
    // 原理：尝试加载一个很小的资源，利用超时判断端口是否开放
    function checkPortService(url, timeout = 5000) {
        return new Promise((resolve) => {
            const img = new Image();
            let resolved = false;
            const timer = setTimeout(() => {
                if (!resolved) {
                    resolved = true;
                    resolve({ ok: false, statusCode: null, error: "port_timeout" });
                }
            }, timeout);

            img.onload = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(timer);
                    resolve({ ok: true, statusCode: 200 });
                }
            };
            img.onerror = () => {
                // 注意：onerror 也可能是因为返回了非图片内容，但至少说明端口可访问且返回了 HTTP 响应
                // 对于 Ollama，它通常返回 JSON，图片加载会触发 onerror，但这并不代表服务不可用
                // 因此我们需要更精细的判断：只要服务器有响应（无论任何状态码），都认为端口是开放的
                if (!resolved) {
                    resolved = true;
                    clearTimeout(timer);
                    // 有响应即认为服务可达（因为端口开放了）
                    resolve({ ok: true, statusCode: 200 });
                }
            };
            img.src = url + '?t=' + Date.now();
        });
    }

    // 更好的端口检测：使用 fetch 的超时机制，但规避 CORS 错误（通过 no-cors 模式，但拿不到状态码，只能知道是否可达）
    function checkPortWithFetch(url, timeout = 5000) {
        return new Promise((resolve) => {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);
            fetch(url, { method: 'HEAD', mode: 'no-cors', signal: controller.signal })
                .then(() => {
                    clearTimeout(timer);
                    // no-cors 模式下，只要能连上就说明端口开放
                    resolve({ ok: true, statusCode: null });
                })
                .catch(() => {
                    clearTimeout(timer);
                    resolve({ ok: false, statusCode: null, error: "fetch_failed" });
                });
        });
    }

    // 统一检测函数
    async function checkService(item) {
        if (item.isPort) {
            // 端口服务检测
            return await checkPortWithFetch(item.url, 5000);
        } else {
            // 网站检测（图片探针）
            return await checkWithImageProbe(item.url, item.fallbackUrl, 8000);
        }
    }

    // 渲染分组
    async function runFullCheck() {
        // 检测网站组
        const webResults = [];
        for (const site of WEBSITES) {
            const result = await checkService(site);
            webResults.push({ name: site.name, ok: result.ok, statusCode: result.statusCode });
        }
        renderGroup(webResults, 'webServiceList', 'webTotalStatus', '网站');

        // 检测API组
        const apiResults = [];
        for (const api of API_SERVICES) {
            const result = await checkService(api);
            apiResults.push({ name: api.name, ok: result.ok, statusCode: result.statusCode });
        }
        renderGroup(apiResults, 'apiServiceList', 'apiTotalStatus', 'API');

        // 全故障检测：所有服务（网站+API）都故障时显示全局停机提醒
        const allServices = [...webResults, ...apiResults];
        const totalCount = allServices.length;
        const successCount = allServices.filter(s => s.ok === true).length;
        
        if (totalCount > 0 && successCount === 0) {
            const webTotalDom = document.getElementById('webTotalStatus');
            const apiTotalDom = document.getElementById('apiTotalStatus');
            if (webTotalDom) {
                webTotalDom.className = "total-status all-stop";
                webTotalDom.innerHTML = `⚠️ 服务器例行停机 · 服务暂时不可用 (所有网站离线)`;
                webTotalDom.style.background = "#fef2f2";
                webTotalDom.style.color = "#991b1b";
            }
            if (apiTotalDom) {
                apiTotalDom.className = "total-status all-stop";
                apiTotalDom.innerHTML = `⚠️ 服务器例行停机 · 服务暂时不可用 (所有API服务离线)`;
                apiTotalDom.style.background = "#fef2f2";
                apiTotalDom.style.color = "#991b1b";
            }
        }
    }

    function renderGroup(items, containerId, totalId, groupName) {
        const container = document.getElementById(containerId);
        const totalDom = document.getElementById(totalId);
        if (!container) return;

        const total = items.length;
        const successCount = items.filter(i => i.ok === true).length;

        container.innerHTML = '';
        for (let item of items) {
            const row = document.createElement('div');
            row.className = 'item-row';
            const isOk = item.ok;
            const statusText = isOk ? '✅ 服务正常' : '❌ 无法访问';
            const statusClass = isOk ? 'status-normal' : 'status-error';
            const codeInfo = item.statusCode ? ` (${item.statusCode})` : '';
            row.innerHTML = `
                <div class="service-name">${escapeHtml(item.name)}</div>
                <div class="status-badge ${statusClass}">${statusText}${codeInfo}</div>
            `;
            container.appendChild(row);
        }

        if (!totalDom) return;

        if (successCount === total && total > 0) {
            totalDom.className = "total-status normal";
            totalDom.innerHTML = `✅ 一切服务运行正常 (${successCount}/${total})`;
            totalDom.style.background = "#e6f7ec";
            totalDom.style.color = "#0b5e2e";
        } else if (successCount === 0) {
            totalDom.className = "total-status all-stop";
            totalDom.innerHTML = `❌ 服务离线 (0/${total})`;
            totalDom.style.background = "#fef2f2";
            totalDom.style.color = "#b91c1c";
        } else {
            totalDom.className = "total-status part-error";
            totalDom.innerHTML = `⚠️ 部分服务异常 (正常 ${successCount}/${total})`;
            totalDom.style.background = "#fff1e0";
            totalDom.style.color = "#c2410c";
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function setCopyrightYear() {
        const footer = document.getElementById('dynamicFooter');
        if (footer) {
            const start = 2026;
            const now = new Date().getFullYear();
            const year = now > start ? `${start}—${now}` : `${start}`;
            footer.innerHTML = `© ${year} 东睿创想（DRTCX）All Rights Reserved.`;
        }
    }

    // 启动
    setCopyrightYear();
    runFullCheck();
    setInterval(runFullCheck, 120000); // 每2分钟自动刷新
</script>
</body>
</html>
