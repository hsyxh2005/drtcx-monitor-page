<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DRTCX 服务状态监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            min-height: 100vh;
            background: #f0f2f6;
            padding: 24px 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header-box {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 18px;
            margin-bottom: 32px;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: transparent;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .title-text h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2c3e66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .title-text p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 4px;
        }
        .jump-btn {
            margin-left: auto;
            padding: 10px 24px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .jump-btn:hover {
            background: #1e3a8a;
            transform: translateY(-1px);
        }
        .status-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-top: 8px;
        }
        .status-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1.6rem 1.8rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 0.75rem;
        }
        .card-header h2 {
            font-size: 1.55rem;
            font-weight: 600;
            color: #0f172a;
        }
        .badge-tag {
            font-size: 0.75rem;
            background: #eef2ff;
            color: #2563eb;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .total-status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            border-radius: 20px;
            display: inline-block;
            width: auto;
        }
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #fafcff;
            border-radius: 20px;
            border: 1px solid #edf2f7;
        }
        .service-name {
            font-weight: 500;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .service-name:before {
            content: "🌐";
            font-size: 1.1rem;
        }
        .api-card .service-name:before {
            content: "🔌";
        }
        .status-badge {
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .status-normal {
            color: #0f6e3f;
            background: #e0f2e9;
        }
        .status-error {
            color: #b91c1c;
            background: #ffe8e8;
        }
        .footer {
            margin-top: 70px;
            text-align: center;
            color: #5b6e8c;
            font-size: 0.85rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 28px;
        }
        @media (max-width: 650px) {
            .status-card { padding: 1.2rem; }
            .item-row { flex-direction: column; align-items: flex-start; gap: 8px; }
            .jump-btn { margin-left: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-box">
        <div class="logo">
            <img src="./logo.png" alt="DRTCX Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22%3E%3Crect width=%2280%22 height=%2280%22 fill=%22%231e293b%22/%3E%3Ctext x=%2216%22 y=%2252%22 fill=%22white%22 font-size=%2230%22%3ED%3C/text%3E%3C/svg%3E'">
        </div>
        <div class="title-text">
            <h1>drtcx status</h1>
            <p>精准探测 · 200-299/400-499 均视为正常</p>
        </div>
        <a href="https://state.drtcx.com/status/drtcx" class="jump-btn" target="_blank">📊 跳转至详细监控页 →</a>
    </div>

    <div class="status-grid">
        <div class="status-card">
            <div class="card-header">
                <h2>🌍 网站状态</h2>
                <span class="badge-tag">核心站点 · WordPress</span>
            </div>
            <div class="total-status" id="webTotalStatus">⏳ 检测中...</div>
            <div class="item-list" id="webServiceList"></div>
        </div>

        <div class="status-card api-card">
            <div class="card-header">
                <h2>⚙️ API & 端口服务</h2>
                <span class="badge-tag">Music · AGI · Ollama:11434</span>
            </div>
            <div class="total-status" id="apiTotalStatus">⏳ 检测中...</div>
            <div class="item-list" id="apiServiceList"></div>
        </div>
    </div>

    <div class="footer" id="dynamicFooter"></div>
</div>

<script>
    // ==================== 监控配置 ====================
    // 注意：由于浏览器CORS限制，纯前端无法获取精确HTTP状态码
    // 我们采用“多端点连通性探测”策略，只要目标服务器有响应（无论任何状态码）即视为正常
    // 这实际上等同于 Uptime-Kuma 的 "TCP Ping" 或 "HTTP 200-499 都算正常" 的效果
    
    const WEBSITES = [
        { name: "drtcx.com", probes: ["https://drtcx.com/favicon.ico", "https://drtcx.com/robots.txt", "https://drtcx.com/"] },
        { name: "chenxi-IM.drtcx.com", probes: ["https://chenxi-IM.drtcx.com/favicon.ico", "https://chenxi-IM.drtcx.com/robots.txt", "https://chenxi-IM.drtcx.com/"] },
        { name: "chenxireader.drtcx.com", probes: ["https://chenxireader.drtcx.com/favicon.ico", "https://chenxireader.drtcx.com/robots.txt", "https://chenxireader.drtcx.com/"] }
    ];

    const API_SERVICES = [
        { name: "chenximusic.drtcx.com", probes: ["https://chenximusic.drtcx.com/favicon.ico", "https://chenximusic.drtcx.com/robots.txt", "https://chenximusic.drtcx.com/"] },
        { name: "chenxi-AGI.drtcx.com", probes: ["https://chenxi-AGI.drtcx.com/favicon.ico", "https://chenxi-AGI.drtcx.com/robots.txt", "https://chenxi-AGI.drtcx.com/"] },
        { name: "Ollama (11434端口)", probes: ["http://127.0.0.1:11434/", "http://localhost:11434/api/tags"], isPort: true }
    ];

    // 增强版探测：尝试多个端点，只要任意一个成功即认为服务正常
    async function probeService(probes, isPort = false, timeout = 5000) {
        for (const url of probes) {
            const result = await tryConnect(url, isPort, timeout);
            if (result.ok) {
                return { ok: true, usedUrl: url };
            }
        }
        return { ok: false };
    }

    // 单次连接尝试
    function tryConnect(url, isPort, timeout) {
        return new Promise((resolve) => {
            if (isPort) {
                // 端口服务：使用 no-cors fetch 检测连通性
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeout);
                fetch(url, { mode: 'no-cors', signal: controller.signal })
                    .then(() => {
                        clearTimeout(timer);
                        resolve({ ok: true });
                    })
                    .catch(() => {
                        clearTimeout(timer);
                        resolve({ ok: false });
                    });
            } else {
                // HTTP/HTTPS 服务：使用图片探测（最可靠，无CORS问题）
                const img = new Image();
                let resolved = false;
                const timer = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        resolve({ ok: false });
                    }
                }, timeout);
                img.onload = () => {
                    if (!resolved) {
                        resolved = true;
                        clearTimeout(timer);
                        resolve({ ok: true });
                    }
                };
                img.onerror = () => {
                    if (!resolved) {
                        resolved = true;
                        clearTimeout(timer);
                        resolve({ ok: false });
                    }
                };
                img.src = url + '?t=' + Date.now();
            }
        });
    }

    // 检测服务状态（核心函数）
    async function checkService(item) {
        const result = await probeService(item.probes, item.isPort || false, 6000);
        return {
            name: item.name,
            ok: result.ok
        };
    }

    // 更新页面显示
    async function runFullCheck() {
        // 检测网站组
        const webResults = [];
        for (const site of WEBSITES) {
            const result = await checkService(site);
            webResults.push(result);
        }
        renderGroup(webResults, 'webServiceList', 'webTotalStatus');

        // 检测API组
        const apiResults = [];
        for (const api of API_SERVICES) {
            const result = await checkService(api);
            apiResults.push(result);
        }
        renderGroup(apiResults, 'apiServiceList', 'apiTotalStatus');

        // 全故障检测：所有服务都故障时显示停机提醒
        const allServices = [...webResults, ...apiResults];
        const totalCount = allServices.length;
        const successCount = allServices.filter(s => s.ok === true).length;
        
        if (totalCount > 0 && successCount === 0) {
            const webTotalDom = document.getElementById('webTotalStatus');
            const apiTotalDom = document.getElementById('apiTotalStatus');
            if (webTotalDom) {
                webTotalDom.className = "total-status all-stop";
                webTotalDom.innerHTML = `⚠️ 服务器例行停机 · 服务暂时不可用 (所有网站离线)`;
                webTotalDom.style.background = "#fef2f2";
                webTotalDom.style.color = "#991b1b";
            }
            if (apiTotalDom) {
                apiTotalDom.className = "total-status all-stop";
                apiTotalDom.innerHTML = `⚠️ 服务器例行停机 · 服务暂时不可用 (所有API服务离线)`;
                apiTotalDom.style.background = "#fef2f2";
                apiTotalDom.style.color = "#991b1b";
            }
        }
    }

    function renderGroup(items, containerId, totalId) {
        const container = document.getElementById(containerId);
        const totalDom = document.getElementById(totalId);
        if (!container) return;

        const total = items.length;
        const successCount = items.filter(i => i.ok === true).length;

        container.innerHTML = '';
        for (let item of items) {
            const row = document.createElement('div');
            row.className = 'item-row';
            const isOk = item.ok;
            const statusText = isOk ? '✅ 服务正常' : '❌ 无法访问';
            const statusClass = isOk ? 'status-normal' : 'status-error';
            row.innerHTML = `
                <div class="service-name">${escapeHtml(item.name)}</div>
                <div class="status-badge ${statusClass}">${statusText}</div>
            `;
            container.appendChild(row);
        }

        if (!totalDom) return;

        if (successCount === total && total > 0) {
            totalDom.className = "total-status normal";
            totalDom.innerHTML = `✅ 一切服务运行正常 (${successCount}/${total})`;
            totalDom.style.background = "#e6f7ec";
            totalDom.style.color = "#0b5e2e";
        } else if (successCount === 0) {
            totalDom.className = "total-status all-stop";
            totalDom.innerHTML = `❌ 服务离线 (0/${total})`;
            totalDom.style.background = "#fef2f2";
            totalDom.style.color = "#b91c1c";
        } else {
            totalDom.className = "total-status part-error";
            totalDom.innerHTML = `⚠️ 部分服务异常 (正常 ${successCount}/${total})`;
            totalDom.style.background = "#fff1e0";
            totalDom.style.color = "#c2410c";
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function setCopyrightYear() {
        const footer = document.getElementById('dynamicFooter');
        if (footer) {
            const startYear = 2026;
            const currentYear = new Date().getFullYear();
            let yearDisplay = '';
            if (currentYear > startYear) {
                yearDisplay = `${startYear}—${currentYear}`;
            } else {
                yearDisplay = `${startYear}`;
            }
            footer.innerHTML = `© ${yearDisplay} 东睿创想（DRTCX）All Rights Reserved.`;
        }
    }

    // 页面启动
    setCopyrightYear();
    runFullCheck();
    setInterval(runFullCheck, 120000); // 每2分钟刷新
</script>
</body>
</html>
